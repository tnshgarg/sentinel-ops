version: '3.8'

services:
  sentinel-server:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - LOG_LEVEL=INFO
      - HOST=0.0.0.0
    volumes:
      - .:/app
    command: uvicorn server.app:app --host 0.0.0.0 --port 8000

  sentinel-ui:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8501:8501"
    environment:
      - STREAMLIT_SERVER_PORT=8501
      - STREAMLIT_SERVER_ADDRESS=0.0.0.0
    depends_on:
      - sentinel-server
    command: streamlit run ui.py

  sentinel-inference:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      - sentinel-server
    environment:
      - SENTINEL_API_URL=http://sentinel-server:8000
      - PERPLEXITY_API_KEY=${PERPLEXITY_API_KEY}
    command: python inference.py --episodes 5
